<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Other Services | Ryan's Home Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/service-pages.css">
  <link rel="stylesheet" href="/css/service-search.css">
</head>
<body class="accordion-page">

<div class="service-page-header">
  <span class="service-page-header-title">Other Services</span>
  <a class="service-page-header-cart" data-cart-link href="/cart">Cart (<span data-cart-count>0</span>)</a>
</div>

<div class="service-search-wrap">
  <input type="search" class="service-search-input" placeholder="Search other services..." aria-label="Search other services">
</div>
<p class="service-search-no-results" hidden>No matching services found.</p>

<div class="accordion-container">

  <!-- SAUNA ASSEMBLY -->
  <div class="category">
    <button class="dropdown-btn" onclick="toggleCategory(this)">
      <span>Sauna Assembly</span>
      <span class="arrow">▼</span>
    </button>
    <div class="content">
      <div class="item">
        <span>Sauna Assembly</span>
        <span class="price">Custom</span>
        <button class="add-btn" onclick="addToCart('Sauna Assembly', 0)">Add</button>
      </div>
    </div>
  </div>

  <!-- BOXES -->
  <div class="category">
    <button class="dropdown-btn" onclick="toggleCategory(this)">
      <span>Boxes</span>
      <span class="arrow">▼</span>
    </button>
    <div class="content">
      <div class="item">
        <span>Break Down Boxes</span>
        <span class="price">$10/box</span>
        <button class="add-btn" onclick="addToCart('Break Down Boxes', 10, '$10/box')">Add</button>
      </div>
      <div class="item">
        <span>Carry Boxes Upstairs (under 100 lbs)</span>
        <span class="price">$20/box</span>
        <button class="add-btn" onclick="addToCart('Carry Boxes Upstairs (under 100 lbs)', 20, '$20/box')">Add</button>
      </div>
    </div>
  </div>

  <!-- OTHER TASKS -->
  <div class="category">
    <button class="dropdown-btn" onclick="toggleCategory(this)">
      <span>Other Tasks</span>
      <span class="arrow">▼</span>
    </button>
    <div class="content">
      <div class="item">
        <span>Other Tasks Not Listed</span>
        <span class="price">$50/hr per person</span>
        <button class="add-btn" onclick="addToCart('Other Tasks Not Listed', 50, '$50/hr per person')">Add</button>
      </div>
    </div>
  </div>

</div>

<script src="/js/config.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/service-search.js"></script>

</body>
</html>

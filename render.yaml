# Render Blueprint — https://render.com/docs/blueprint-spec
#
# After deploy, set env vars on the API service (see server/.env.example).
# Update js/config.js with your live Render URLs if they differ from the defaults.

services:
  - type: web
    name: rhsvegas-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: DATABASE_PATH
        value: ./data/rhsvegas.db

  - type: web
    name: rhsvegas-site
    runtime: static
    buildCommand: "true"
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=300
    routes:
      - type: rewrite
        source: /cart
        destination: /cart/index.html
      - type: rewrite
        source: /checkout
        destination: /checkout/index.html
      - type: rewrite
        source: /confirmation
        destination: /confirmation/index.html
      - type: rewrite
        source: /services
        destination: /services/index.html
      - type: rewrite
        source: /assembly
        destination: /assembly/index.html
      - type: rewrite
        source: /installation
        destination: /installation/index.html
      - type: rewrite
        source: /other-services
        destination: /other-services/index.html

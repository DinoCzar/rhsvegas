# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Hosting: Render (site + API) with GoDaddy domain (rhsvegas.com).
# See RENDER-GODADDY.md for DNS and custom domain setup.

services:
  - type: web
    name: rhsvegas-api
    runtime: node
    rootDir: .
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "24h"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: FRONTEND_ORIGINS
        value: https://rhsvegas.com,https://www.rhsvegas.com,https://rhsvegas-site.onrender.com,https://rhsvegas-site-c5y0.onrender.com,https://rhsvegas-api-c5y0.onrender.com,https://api.rhsvegas.com
      - key: DATABASE_PATH
        value: ./data/rhsvegas.db

  - type: web
    name: rhsvegas-site
    runtime: static
    buildCommand: "true"
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache, must-revalidate
    routes:
      - type: rewrite
        source: /cart
        destination: /cart/index.html
      - type: rewrite
        source: /checkout
        destination: /checkout/index.html
      - type: rewrite
        source: /confirmation
        destination: /confirmation/index.html
      - type: rewrite
        source: /services
        destination: /services/index.html
      - type: rewrite
        source: /assembly
        destination: /assembly/index.html
      - type: rewrite
        source: /installation
        destination: /installation/index.html
      - type: rewrite
        source: /other-services
        destination: /other-services/index.html

# Render Blueprint — https://render.com/docs/blueprint-spec
#
# After connecting this repo in Render, set env vars on the API service
# (see server/.env.example). Then update js/config.js apiUrl with your
# live API URL, e.g. https://rhsvegas-api.onrender.com/api

services:
  - type: web
    name: rhsvegas-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: DATABASE_PATH
        value: /var/data/rhsvegas.db

  - type: web
    name: rhsvegas-site
    runtime: static
    buildCommand: echo "Static site — no build step"
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600

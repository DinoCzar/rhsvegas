# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Hosting: Render (site + API) with GoDaddy domain (rhsvegas.com).
# See RENDER-GODADDY.md for DNS and custom domain setup.

services:
  - type: web
    name: rhsvegas-api
    runtime: node
    rootDir: .
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "24h"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SYNC_PASSWORD
        value: "false"
      - key: OWNER_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: FRONTEND_ORIGINS
        value: https://rhsvegas.com,https://www.rhsvegas.com,https://rhsvegas-site.onrender.com,https://rhsvegas-api.onrender.com,https://api.rhsvegas.com
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false

  - type: web
    name: rhsvegas-site
    runtime: static
    buildCommand: "true"
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache, must-revalidate
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline'; script-src-attr 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://rhsvegas-api.onrender.com https://api.rhsvegas.com http://localhost:3001; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
    routes:
      - type: rewrite
        source: /cart
        destination: /cart/index.html
      - type: rewrite
        source: /checkout
        destination: /checkout/index.html
      - type: rewrite
        source: /confirmation
        destination: /confirmation/index.html
      - type: rewrite
        source: /services
        destination: /services/index.html
      - type: rewrite
        source: /assembly
        destination: /assembly/index.html
      - type: rewrite
        source: /installation
        destination: /installation/index.html
      - type: rewrite
        source: /other-services
        destination: /other-services/index.html
      - type: rewrite
        source: /service-not-found
        destination: /service-not-found/index.html
      - type: rewrite
        source: /gallery
        destination: /gallery/index.html
      - type: rewrite
        source: /our-mission
        destination: /our-mission/index.html
      - type: rewrite
        source: /contact
        destination: /contact/index.html

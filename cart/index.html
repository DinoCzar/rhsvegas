<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Ryan's Home Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/pages.css">
</head>
<body>

<div class="page-site-header">
  <span>Ryan's Home Solutions</span>
  <a data-cart-link href="/cart">Cart (<span data-cart-count>0</span>)</a>
</div>

<div class="page-wrap">
  <h1>Your Cart</h1>
  <p class="subtitle">Review your selected services before checkout. No payment is due online.</p>

  <div class="card" id="cart-card">
    <div id="cart-items"></div>
    <div class="summary-row" id="cart-summary" hidden>
      <span>Estimated total</span>
      <span id="cart-total">$0</span>
    </div>
  </div>

  <div class="actions">
    <a class="btn btn-primary" id="checkout-btn" href="/checkout">Proceed to Checkout</a>
    <button class="remove-btn" id="clear-cart-btn" type="button">Clear Cart</button>
  </div>
  <p class="note">Custom-priced items are listed as TBD. Final pricing may be confirmed before your appointment.</p>
  <a class="btn-secondary" href="/services/">← Continue shopping</a>
</div>

<script src="/js/config.js"></script>
<script src="/js/cart.js"></script>
<script>
  (function () {
    var checkoutBtn = document.getElementById("checkout-btn");
    var clearBtn = document.getElementById("clear-cart-btn");
    var itemsEl = document.getElementById("cart-items");
    var summaryEl = document.getElementById("cart-summary");
    var totalEl = document.getElementById("cart-total");

    if (window.RHS_CONFIG && RHS_CONFIG.checkoutUrl) {
      checkoutBtn.href = RHS_CONFIG.checkoutUrl;
    }

    function renderCart() {
      var items = RHSCart.getItems();
      itemsEl.innerHTML = "";

      if (!items.length) {
        summaryEl.hidden = true;
        checkoutBtn.style.pointerEvents = "none";
        checkoutBtn.style.opacity = "0.5";
        itemsEl.innerHTML = '<div class="empty-state">Your cart is empty.</div>';
        return;
      }

      checkoutBtn.style.pointerEvents = "";
      checkoutBtn.style.opacity = "";

      items.forEach(function (item, index) {
        var row = document.createElement("div");
        row.className = "cart-item";
        row.innerHTML =
          '<div class="cart-item-name">' + escapeHtml(item.name) + "</div>" +
          '<div class="cart-item-price">' + escapeHtml(item.priceLabel || RHSCart.formatPrice(item.price)) + "</div>" +
          '<button class="remove-btn" type="button" data-index="' + index + '">Remove</button>';
        itemsEl.appendChild(row);
      });

      summaryEl.hidden = false;
      totalEl.textContent = RHSCart.formatPrice(RHSCart.getTotal()) +
        (RHSCart.getTotal() === 0 ? " (custom items may apply)" : "");
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    itemsEl.addEventListener("click", function (event) {
      var button = event.target.closest("[data-index]");
      if (!button) return;
      RHSCart.removeItem(Number(button.getAttribute("data-index")));
      renderCart();
    });

    clearBtn.addEventListener("click", function () {
      if (confirm("Remove all items from your cart?")) {
        RHSCart.clear();
        renderCart();
      }
    });

    renderCart();
  })();
</script>

</body>
</html>

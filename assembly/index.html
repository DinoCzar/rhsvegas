<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assembly Services | Ryan's Home Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/service-pages.css">
  <link rel="stylesheet" href="/css/service-search.css">
</head>
<body class="accordion-page">

<div class="service-page-header">
  <span>Assembly Services</span>
  <a data-cart-link href="/cart">Cart (<span data-cart-count>0</span>)</a>
</div>

<div class="service-search-wrap">
  <input type="search" class="service-search-input" placeholder="Search assembly services..." aria-label="Search assembly services">
</div>
<p class="service-search-no-results" hidden>No matching services found.</p>

<div class="accordion-container">

  <!-- DRESSERS -->
  <div class="category">
    <button class="dropdown-btn" onclick="toggleCategory(this)">
      <span>Dressers and Wardrobes</span>
      <span class="arrow">▼</span>
    </button>
    <div class="content">
      <div class="item">
        <span>Nightstand (1-2 drawer)</span>
        <span class="price">$45</span>
        <button class="add-btn" onclick="addToCart('Nightstand (1-2 drawer)', 45)">Add</button>
      </div>
      <div class="item">
        <span>Dresser (3-4 drawers)</span>
        <span class="price">$90</span>
        <button class="add-btn" onclick="addToCart('Dresser (3-4 drawers)', 90)">Add</button>
      </div>
      <div class="item">
        <span>Dresser (5-6 drawers)</span>
        <span class="price">$120</span>
        <button class="add-btn" onclick="addToCart('Dresser (5-6 drawers)', 120)">Add</button>
      </div>
      <div class="item">
        <span>Dresser (7-8 drawers)</span>
        <span class="price">$150</span>
        <button class="add-btn" onclick="addToCart('Dresser (7-8 drawers)', 150)">Add</button>
      </div>
      <div class="item">
        <span>Wardrobe Medium</span>
        <span class="price">$180</span>
        <button class="add-btn" onclick="addToCart('Wardrobe Medium', 180)">Add</button>
      </div>
      <div class="item">
        <span>Wardrobe Large</span>
        <span class="price">$270</span>
        <button class="add-btn" onclick="addToCart('Wardrobe Large', 270)">Add</button>
      </div>
    </div>
  </div>

  <!-- BED FRAMES -->
  <div class="category">
    <button class="dropdown-btn" onclick="toggleCategory(this)">
      <span>Bed Frames</span>
      <span class="arrow">▼</span>
    </button>
    <div class="content">
      <div class="item">
        <span>Headboard</span>
        <span class="price">$45</span>
        <button class="add-btn" onclick="addToCart('Headboard', 45)">Add</button>
      </div>
      <div class="item">
        <span>Bed Frame</span>
        <span class="price">$90</span>
        <button class="add-btn" onclick="addToCart('Bed Frame', 90)">Add</button>
      </div>
      <div class="item">
        <span>Bunk Bed</span>
        <span class="price">$225</span>
        <button class="add-btn" onclick="addToCart('Bunk Bed', 225)">Add</button>
      </div>
    </div>
  </div>

  <!-- TV STANDS -->
  <div class="category">
    <button class="dropdown-btn" onclick="toggleCategory(this)">
      <span>TV Stands / Entertainment</span>
      <span class="arrow">▼</span>
    </button>
    <div class="content">
      <div class="item">
        <span>TV Stand Medium</span>
        <span class="price">$135</span>
        <button class="add-btn" onclick="addToCart('TV Stand Medium', 135)">Add</button>
      </div>
      <div class="item">
        <span>TV Stand Large</span>
        <span class="price">$225</span>
        <button class="add-btn" onclick="addToCart('TV Stand Large', 225)">Add</button>
      </div>
    </div>
  </div>

</div>

<script src="/js/config.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/service-search.js"></script>

</body>
</html>
